version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    depends_on:
      - db
      - rabbitmq
    networks:
      - nlp-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - ./.env
    depends_on:
      - db
      - rabbitmq
    networks:
      - nlp-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secure
      MYSQL_DATABASE: nlp_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password_secure
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-ppassword_secure"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nlp-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nlp-network

  test:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: pytest -q
    env_file:
      - ./.env
    depends_on:
      - db
      - rabbitmq
    networks:
      - nlp-network

volumes:
  db_data:

networks:
  nlp-network:
    driver: bridge
